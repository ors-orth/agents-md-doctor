name: Feature request
description: Suggest an improvement or a new detection/lint rule.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What repository or agent workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should agents-md-doctor generate, detect, or lint?
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example project files
      description: Include relevant snippets from package.json, pyproject.toml, Cargo.toml, Makefile, or workflows.

