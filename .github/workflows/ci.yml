name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Check JavaScript syntax
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Check CLI help
        run: npm run build

      - name: Run agents-md-doctor lint
        run: node bin/agents-md-doctor.js lint

